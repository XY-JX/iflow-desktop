<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    
    <!-- 月亮渐变 -->
    <radialGradient id="moonGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff7e6;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </radialGradient>
    
    <!-- 星星渐变 -->
    <radialGradient id="starGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:0" />
    </radialGradient>
    
    <!-- 梦境光晕 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1024" height="1024" fill="url(#bgGradient)" rx="200" ry="200"/>
  
  <!-- 星星装饰 -->
  <g filter="url(#glow)">
    <circle cx="150" cy="180" r="4" fill="url(#starGradient)"/>
    <circle cx="280" cy="120" r="3" fill="url(#starGradient)"/>
    <circle cx="900" cy="150" r="5" fill="url(#starGradient)"/>
    <circle cx="820" cy="220" r="3" fill="url(#starGradient)"/>
    <circle cx="100" cy="850" r="4" fill="url(#starGradient)"/>
    <circle cx="920" cy="880" r="3" fill="url(#starGradient)"/>
    <circle cx="200" cy="750" r="3" fill="url(#starGradient)"/>
    <circle cx="750" cy="700" r="4" fill="url(#starGradient)"/>
    <circle cx="500" cy="100" r="2" fill="url(#starGradient)"/>
    <circle cx="600" cy="920" r="3" fill="url(#starGradient)"/>
  </g>
  
  <!-- 月亮 -->
  <g filter="url(#glow)">
    <circle cx="512" cy="512" r="180" fill="url(#moonGradient)"/>
    <!-- 月亮纹理 -->
    <circle cx="450" cy="480" r="25" fill="#ffefd5" opacity="0.6"/>
    <circle cx="560" cy="540" r="18" fill="#ffefd5" opacity="0.5"/>
    <circle cx="490" cy="560" r="22" fill="#ffefd5" opacity="0.4"/>
    <circle cx="540" cy="460" r="15" fill="#ffefd5" opacity="0.5"/>
  </g>
  
  <!-- 梦境符号 - 云朵 -->
  <g fill="#e6f3ff" opacity="0.3" filter="url(#glow)">
    <ellipse cx="300" cy="650" rx="120" ry="50"/>
    <ellipse cx="450" cy="680" rx="100" ry="40"/>
    <ellipse cx="600" cy="650" rx="130" ry="55"/>
    <ellipse cx="700" cy="700" rx="90" ry="35"/>
  </g>
  
  <!-- 梦境符号 - 流星 -->
  <g fill="#ffffff" opacity="0.8" filter="url(#glow)">
    <path d="M 750 200 L 780 180 L 760 210 L 790 220 L 760 240 L 780 270 L 750 260 L 740 290 L 730 260 L 700 250 L 730 240 L 720 210 Z"/>
  </g>
  
  <!-- 装饰圆环 -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <circle cx="512" cy="512" r="320" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  
  <!-- 文字标签 -->
  <text x="512" y="900" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" opacity="0.9">
    我的一个梦
  </text>
</svg>